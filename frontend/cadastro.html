<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MdClothing | Cadastro </title> 
  <link rel="stylesheet" href="../src/output.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap');
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-black text-white flex justify-center items-center h-screen px-4">

  <div class="bg-red-600 w-full max-w-xs rounded-xl overflow-hidden">
    <div class="bg-white text-black text-center py-2 text-sm font-bold tracking-widest">
      CADASTRE-SE
    </div>
  <div class="p-6 flex flex-col items-center gap-4">

    <div class="bg-black w-16 h-10 rounded-full flex items-center justify-center">
        <img class="rounded-full" src="logomd.png" alt="logomd">
    </div>    

    <input type="text" placeholder="Nome completo"
        class="w-full bg-black border border-white/10 rounded px-3 py-2 text-sm text-white placeholder-white "/>
    <input type="email" placeholder="E-mail"
        class="w-full bg-black border border-white/10 rounded px-3 py-2 text-sm text-white placeholder-red-500"/>
    <input type="password" placeholder="Senha"
        class="w-full bg-black border border-white/10 rounded px-3 py-2 text-sm text-white placeholder-white"/>

    <button class="w-full bg-black text-white py-2 rounded text-sm font-bold hover:bg-white hover:text-red-600 transition-colors">
        CADASTRAR
    </button>

    <a href="login.html" class="text-xs text-white/70 hover:text-white">
        Já possui conta? Faça login
    </a>
    
    <span class="dm-sans text-lg">MdClothing</span>
        </div>
  </div>
</body>
</html>
