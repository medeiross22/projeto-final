<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MdClothing | Login </title> 
  <link rel="stylesheet" href="../src/output.css">
    <style>

  </style>
</head>
<body class="bg-red-600 text-white min-h-screen flex items-center justify-center px-4">

      <div class="bg-black text-white text-center py-2 text-sm font-bold tracking-widest">

      </div>

        <img class="rounded-full" src="logomd.png" alt="logomd">
    </div>    
 
  
        <input type="email" placeholder="E-mail"

        <a href="cadastro.html" class="text-xs text-black hover:text-black/50">

        </a>
 

        <button class="w-full bg-black text-white py-2 rounded text-sm font-bold  hover:bg-red-600">

        <span class="dm-sans text-lg  text-black">MdClothing</span>

    </div>
